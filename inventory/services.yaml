---
# Canonical service inventory — all 29 git-tracked directories under services/.
#
# category values:
#   compose_managed  has compose.yml + .deploy; deployed via GitOps deploy.sh
#   special          has .deploy but no compose.yml (ai VM ownership marker)
#   ct_resident      dedicated LXC/VM managed outside GitOps; no .deploy
#   doc_only         documentation stub only; no deployable artifact
#
# host (required for compose_managed and special): key from hosts.yaml
# build: true when .deploy carries BUILD=true (source-build required before deploy)

ai:
  category: special
  host: ai
  notes: ".deploy present but no compose.yml — the VM itself is the unit, not a compose stack"

anri:
  category: ct_resident
  notes: "CT 129 (192.168.x.165) — Khris's personal agent, Telegram-connected"

ash:
  category: ct_resident
  notes: "CT 136 (192.168.x.172) — Hermes Agent; plays Pokemon Blue via PyBoy emulation; no GitOps authority"

