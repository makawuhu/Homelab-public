services:
  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    ports:
      - "8091:8090"
    volumes:
      - /opt/beszel/hub_data:/beszel_data

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    ports:
      - "991:991"
    environment:
      - PORT=991
      - KEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGwToK66mJCHd5XGsuLPVmtY2vF5Hg94Fr6Rs+m1iJ4S
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
