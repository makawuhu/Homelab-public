# GitOps deploy pilot — managed via .deploy metadata
services:
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.17
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    environment:
      - TZ=America/Los_Angeles
    restart: unless-stopped

volumes:
  uptime-kuma-data:
